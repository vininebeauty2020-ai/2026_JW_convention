<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>카카오톡 발송용 폼</title>
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
  
  <script>
    Kakao.init('afcb2f5459127a85b500592fab59e860'); 
    
    function shareMessage() {
      // 손님들이 버튼을 누르면 이동할 진짜 초대장 주소 (index.html)
      const guestUrl = 'https://vininebeauty2020-ai.github.io/my-portfolio/2026_convention/';
      
      Kakao.Share.sendDefault({
        objectType: 'feed',
        content: {
          title: '2026 지역대회에 초대합니다',
          description: '소중한 분들을 초대합니다.',
          imageUrl: 'https://vininebeauty2020-ai.github.io/my-portfolio/2026_convention/img/초대장_이미지1.png', 
          link: {
            mobileWebUrl: guestUrl,
            webUrl: guestUrl,
          },
        },
        buttons: [
          {
            title: 'JW 공식웹사이트',
            link: {
              mobileWebUrl: 'https://www.jw.org/ko/%EC%97%AC%ED%98%B8%EC%99%80%EC%9D%98-%EC%A6%9D%EC%9D%B8/conventions/',
              webUrl: 'https://www.jw.org/ko/%EC%97%AC%ED%98%B8%EC%99%80%EC%9D%98-%EC%A6%9D%EC%9D%B8/conventions/',
            },
          },
          {
            title: '초대장 보기',
            link: {
              mobileWebUrl: guestUrl,
              webUrl: guestUrl,
            },
          }
        ],
      });
    }
  </script>
</head>
<body style="text-align: center; padding-top: 100px; background-color: #f0f0f0;">

  <h2>비밀 전송용 폼 🚀</h2>
  <p>이 페이지는 초대장을 카톡으로 쏠 때만 씁니다!</p>
  
  <button onclick="shareMessage()" style="padding: 15px 30px; font-size: 18px; font-weight: bold; background-color: #FEE500; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    카카오톡으로 손님들에게 쏘기!
  </button>

</body>
</html>
