<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-width=1.0">
  <title>모바일 초대장</title>
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
  
  <script>
    // 1. 발급받은 자바스크립트 키로 초기화
    Kakao.init('afcb2f5459127a85b500592fab59e860'); 
    
    // 2. 카카오톡 공유하기 함수
    function shareMessage() {
      Kakao.Share.sendDefault({
        objectType: 'feed',
        content: {
          title: '초대합니다', // 카카오톡 톡방에 보일 큰 제목
          description: '소중한 분들을 초대합니다.', // 제목 아래의 작은 설명
          imageUrl: 'https://www.miricanvas.com/login?redirect=%2Fv2%2Fko%2Fdesign2%2Fb0e8564d-38cd-4ba1-8185-149a282b35f7%3Flocation%3Ddesign%26type%3Dcopy_link%26access%3Ddirect', // 카카오톡에 보일 미리보기 이미지 링크
          link: {
            mobileWebUrl: 'https://www.miricanvas.com/login?redirect=%2Fv2%2Fko%2Fdesign2%2F5d95cac6-d81c-43a5-8cb2-437ea76e0e3d%3Flocation%3Ddesign%26type%3Dcopy_link%26access%3Ddirect요',
            webUrl: 'https://www.miricanvas.com/login?redirect=%2Fv2%2Fko%2Fdesign2%2F5d95cac6-d81c-43a5-8cb2-437ea76e0e3d%3Flocation%3Ddesign%26type%3Dcopy_link%26access%3Ddirect',
          },
        },
        buttons: [
          {
            title: 'JW 공식웹사이트 바로가기',
            link: {
              mobileWebUrl: 'https://www.jw.org/ko/%EC%97%AC%ED%98%B8%EC%99%80%EC%9D%98-%EC%A6%9D%EC%9D%B8/conventions/',
              webUrl: 'https://www.jw.org/ko/%EC%97%AC%ED%98%B8%EC%99%80%EC%9D%98-%EC%A6%9D%EC%9D%B8/conventions/',
            },
          },
          {
            title: '초대장 보기',
            link: {
              mobileWebUrl: 'https://www.miricanvas.com/login?redirect=%2Fv2%2Fko%2Fdesign2%2F5d95cac6-d81c-43a5-8cb2-437ea76e0e3d%3Flocation%3Ddesign%26type%3Dcopy_link%26access%3Ddirect',
              webUrl: 'https://www.miricanvas.com/login?redirect=%2Fv2%2Fko%2Fdesign2%2F5d95cac6-d81c-43a5-8cb2-437ea76e0e3d%3Flocation%3Ddesign%26type%3Dcopy_link%26access%3Ddirect',
            },
          }
        ],
      });
    }
  </script>
</head>
<body>

  <div style="text-align: center; margin-top: 50px;">
    <h2>모바일 초대장</h2>
    <button onclick="shareMessage()" style="padding: 10px 20px; font-size: 16px; background-color: #FEE500; border: none; border-radius: 5px; cursor: pointer;">
      카카오톡으로 초대장 보내기
    </button>
  </div>

</body>
</html>
